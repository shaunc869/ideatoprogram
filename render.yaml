services:
  - type: web
    name: ideatoprogram
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_URL
        value: https://ideatoprogram.com
